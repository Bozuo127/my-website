<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ye Erqi</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display";
background:#000;
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* ===== 顶部控制 ===== */
.topbar{
position:fixed;
top:20px;
right:20px;
z-index:999;
display:flex;
gap:10px;
}

.topbar button{
background:none;
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

/* ===== 滚动区块 ===== */
section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

/* ===== 大标题 ===== */
h1{
font-size:64px;
font-weight:600;
margin:0;
letter-spacing:-1px;
opacity:0;
transform:translateY(40px);
animation:show 1s forwards;
}

p{
opacity:0.7;
max-width:600px;
line-height:1.6;
}

/* 动画 */
@keyframes show{
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== 输入框 ===== */
input{
padding:14px;
border-radius:12px;
border:none;
text-align:center;
font-size:16px;
margin-top:20px;
outline:none;
}

/* ===== 按钮 ===== */
button{
margin-top:10px;
padding:10px 18px;
border-radius:20px;
border:none;
cursor:pointer;
}

/* ===== 白色区块 ===== */
.light{
background:#fff;
color:#000;
}

.light button{
border:1px solid #000;
color:#000;
}

/* ===== Q&A ===== */
textarea{
width:300px;
height:120px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">
<button onclick="lang()">🌐 EN/中</button>
<button onclick="mode()">🌓</button>
</div>

<!-- ===== 1 首屏 ===== -->
<section>
<h1>Say My Name</h1>
<p id="sub">请输入你的名字进入</p>

<input id="name" placeholder="name">
<button onclick="check()">Enter</button>

<p id="msg"></p>
</section>

<!-- ===== 2 关于 ===== -->
<section>
<h1>Ye Erqi</h1>
<p id="intro">
宁波大学 · 电气工程 · 大二 · 19岁
</p>
</section>

<!-- ===== 3 兴趣 ===== -->
<section>
<h1 id="h">Hobbies</h1>
<p id="hob">
🏓 乒乓球<br>
⚽ 足球<br>
📚 阅读：《球状闪电》<br>
🎵 Hey Jude
</p>
</section>

<!-- ===== 4 Q&A ===== -->
<section>
<h1>Q&A</h1>

<textarea id="q" placeholder="Ask me..."></textarea>
<br>
<button onclick="send()">Send</button>

<p style="opacity:0.6;margin-top:10px;">
（会尽力回复！）
</p>
</section>

<script>

let ok=false;
let en=false;

/* ===== 验证 ===== */
function check(){
let v=document.getElementById("name").value;
if(v==="叶尔祺"){
ok=true;
document.getElementById("msg").innerText="✔ Welcome";
}else{
document.getElementById("msg").innerText="Wrong Name";
}
}

/* ===== 邮件 ===== */
function send(){
let q=document.getElementById("q").value;
if(!q)return;

window.location.href=
"mailto:15258895590@163.com?subject=Q&A&body="+encodeURIComponent(q);
}

/* ===== 语言 ===== */
function lang(){
en=!en;

document.getElementById("sub").innerText =
en ? "Enter your name" : "请输入你的名字进入";

document.getElementById("intro").innerText =
en ? "Ningbo University · Electrical Engineering · Sophomore · 19"
   : "宁波大学 · 电气工程 · 大二 · 19岁";

document.getElementById("h").innerText =
en ? "Hobbies" : "兴趣爱好";

document.getElementById("hob").innerHTML =
en ?
"🏓 Table Tennis<br>⚽ Football<br>📚 Book: Ball Lightning<br>🎵 Hey Jude"
:
"🏓 乒乓球<br>⚽ 足球<br>📚 阅读：《球状闪电》<br>🎵 Hey Jude";
}

/* ===== 模式 ===== */
function mode(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
