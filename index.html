<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say My Name</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* ===== 开场 ===== */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#intro h1 {
  font-size:40px;
  letter-spacing:2px;
}

#intro p {
  opacity:0.7;
}

/* ===== 锁屏 ===== */
#lock {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9998;
}

.box {
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  text-align:center;
}

/* ===== 主体 ===== */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
  display:none;
}

.card {
  background:#1e293b;
  padding:20px;
  margin:15px 0;
  border-radius:12px;
}

/* ===== 按钮 ===== */
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  margin-top:10px;
}

/* ===== 输入 ===== */
input {
  padding:10px;
  width:80%;
  margin-top:10px;
}

/* ===== 技能条 ===== */
.bar {
  background:#334155;
  border-radius:10px;
  overflow:hidden;
}
.bar div {
  height:10px;
  background:#38bdf8;
}

/* ===== 打字 ===== */
#type {
  font-size:22px;
  margin-top:10px;
}

/* ===== 粒子背景 ===== */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- ===== 开场 ===== -->
<div id="intro">
  <h1>Say My Name</h1>
  <p>click to continue</p>
  <button onclick="start()">Enter</button>
</div>

<!-- ===== 锁屏 ===== -->
<div id="lock">
  <div class="box">
    <h2>Enter Name</h2>
    <input id="name">
    <br>
    <button onclick="check()">Enter</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ===== 主体 ===== -->
<div class="container" id="main">

<h1 id="type"></h1>

<div class="card">
  <h2>👤 About Me</h2>
  <p>一个正在学习技术的大学生</p>
</div>

<div class="card">
  <h2>📊 Skills</h2>
  <p>HTML</p>
  <div class="bar"><div style="width:90%"></div></div>

  <p>JavaScript</p>
  <div class="bar"><div style="width:70%"></div></div>

  <p>Python</p>
  <div class="bar"><div style="width:60%"></div></div>
</div>

<div class="card">
  <h2>💼 Projects</h2>
  <p>✔ Personal Website</p>
  <p>✔ GitHub Pages Site</p>
</div>

<div class="card">
  <h2>💬 Q&A</h2>
  <input id="q" placeholder="ask something...">
  <button onclick="add()">Send</button>
  <ul id="list"></ul>
</div>

<button onclick="mode()">🌙 toggle mode</button>

</div>

<script>

/* ===== 开场 ===== */
function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("lock").style.display="flex";
}

/* ===== 验证 ===== */
function check(){
  const v = document.getElementById("name").value;
  if(v==="叶尔祺"){
    document.getElementById("lock").style.display="none";
    document.getElementById("main").style.display="block";
    type();
  }else{
    document.getElementById("msg").innerText="Wrong Name";
  }
}

/* ===== 打字 ===== */
const text="Welcome to my world";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("type").innerHTML+=text[i++];
    setTimeout(type,100);
  }
}

/* ===== 问答 ===== */
function add(){
  let v=document.getElementById("q").value;
  if(!v)return;
  let li=document.createElement("li");
  li.innerText=v;
  document.getElementById("list").appendChild(li);
  localStorage.setItem("q",document.getElementById("list").innerHTML);
}

/* ===== 模式 ===== */
function mode(){
  document.body.classList.toggle("light");
}

/* ===== 粒子背景 ===== */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];
for(let i=0;i<80;i++){
  dots.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#38bdf8";
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fill();
    d.y+=1;
    if(d.y>canvas.height)d.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
